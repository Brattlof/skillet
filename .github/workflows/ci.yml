name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Verify formatting
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - run: go vet ./...
      - name: Test with race detector and coverage
        run: go test -race -covermode=atomic -coverprofile=cover.out ./...
      - name: Enforce coverage floor
        run: |
          floor=55.0
          total=$(go tool cover -func=cover.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "total coverage ${total}% (floor ${floor}%)"
          awk -v t="$total" -v f="$floor" 'BEGIN { if (t + 0 < f + 0) exit 1 }'
      - run: go build ./...
      - name: Validate registry shards
        run: go run ./cmd/buildindex -check
      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: Check for known vulnerabilities
        env:
          # govulncheck's latest release needs a newer Go than the module's
          # declared minimum. setup-go pins GOTOOLCHAIN=local, so allow the go
          # command to fetch the toolchain it needs for this step only.
          GOTOOLCHAIN: auto
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

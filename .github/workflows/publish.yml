name: publish-index

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'commands/**'
      - 'hooks/**'
      - 'mcp/**'
      - 'cmd/buildindex/**'
      - 'internal/registry/**'
      - '.github/workflows/publish.yml'

permissions:
  contents: write

concurrency:
  group: publish-index
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
      - name: Compile index
        run: go run ./cmd/buildindex -out dist/index.json
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
      - name: Purge the jsDelivr cache
        # jsDelivr edge-caches the @gh-pages index, so without this a published
        # registry update is invisible to users for hours. Best-effort.
        run: curl -sf "https://purge.jsdelivr.net/gh/Brattlof/skillet@gh-pages/index.json" >/dev/null || true
